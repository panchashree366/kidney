```html
<!DOCTYPE html>
<html>
<head>
    <title>Kidney Disease Prediction</title>

    <style>

        body{
            font-family: Arial;
            background:#f2f2f2;
            text-align:center;
        }

        .container{
            width:600px;
            margin:auto;
            margin-top:40px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 10px gray;
        }

        h1{
            color:#1d3557;
        }

        input{
            padding:10px;
        }

        button{
            padding:12px 25px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        img{
            margin-top:20px;
            width:300px;
            border-radius:10px;
        }

        .result{
            margin-top:20px;
            font-size:22px;
            color:green;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

<h1>Kidney Disease Classification</h1>

<h3>Classes: Cyst | Normal | Stone | Tumor</h3>

<form action="/predict" method="POST" enctype="multipart/form-data">

<input type="file" name="image" required>

<br><br>

<button type="submit">Predict</button>

</form>

{% if image_path %}

<img src="{{ image_path }}">

{% endif %}

{% if prediction %}

<div class="result">

Prediction : {{ prediction }}

<br><br>

Confidence : {{ confidence }} %

</div>

{% endif %}

</div>

</body>
</html>
